services:
  postgres:
    build:
      context: ..          # raíz de la extensión (donde están .c, Makefile, Dockerfile)
      dockerfile: Dockerfile
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    command: >
      postgres
        -c shared_preload_libraries='pg_login_stat'
        -c hba_file=/etc/postgresql/pg_hba.conf
        -c log_connections=on
        -c log_disconnections=on
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./init.sql:/docker-entrypoint-initdb.d/10_pg_login_stat.sql:ro

volumes:
  pgdata:
